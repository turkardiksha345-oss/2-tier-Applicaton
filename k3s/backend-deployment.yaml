apiVersion: apps/v1
kind: Deployment
metadata:
  name: rock-paper-scissors-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rock-paper-scissors-backend
  template:
    metadata:
      labels:
        app: rock-paper-scissors-backend
    spec:
      containers:
      - name: backend-container
        image: rock-paper-scissors-backend:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        ports:
        - containerPort: 3000
